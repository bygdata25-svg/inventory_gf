services:
  backend:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+psycopg2://app_user:app_password@host.docker.internal:5432/fabrics_inventory
      JWT_SECRET_KEY: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
      JWT_ALGORITHM: "HS256"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
        VITE_API_BASE_URL: "https://cash-either-wholesale-investors.trycloudflare.com" 
#       VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend

